name: Security Scan

on:
  pull_request:
    types: [opened, synchronize, labeled]

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: security-scan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scan:
    uses: __TEMPLATES_REPO__/.github/workflows/security-scan.yml@__TEMPLATES_REF__
    secrets: inherit
